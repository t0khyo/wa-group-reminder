services:
  gigi-bot:
    build: .
    container_name: gigi-wa-bot
    restart: unless-stopped
    depends_on:
      gigi-db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@gigi-db:5432/gigi_db?schema=public}
      
      # AI Provider
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      
      # OpenAI (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4}
      
      # Gemini (optional)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash-exp}
      
      # Timezone - Set container timezone to match application timezone
      TZ: Asia/Kuwait
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Environment
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      # Persist WhatsApp authentication data
      - auth-data:/app/auth_info
      # Persist logs - using named volume to avoid permission issues with non-root user
      - logs-data:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  gigi-db:
    image: postgres:16-alpine
    container_name: gigi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gigi_db}
    # Port mapping commented out for security (app connects internally)
    # Uncomment only if you need external database access (e.g., from pgAdmin/TablePlus)
    # If you enable this, make sure to set a strong POSTGRES_PASSWORD in .env
    # ports:
    #   - "${DB_PORT:-5437}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gigi_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  db-data:
  auth-data:
  logs-data:
